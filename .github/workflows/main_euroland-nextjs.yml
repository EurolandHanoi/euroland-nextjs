# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - euroland-nextjs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies and build
        env:
          NEXT_PUBLIC_ANALYTICS_ENDPOINT: ${{ secrets.NEXT_PUBLIC_ANALYTICS_ENDPOINT }}
          NEXT_PUBLIC_ANALYTICS_WEBSITE_ID: ${{ secrets.NEXT_PUBLIC_ANALYTICS_WEBSITE_ID }}
          NEXT_PUBLIC_OAUTH_PORTAL_URL: ${{ secrets.NEXT_PUBLIC_OAUTH_PORTAL_URL }}
          NEXT_PUBLIC_APP_ID: ${{ secrets.NEXT_PUBLIC_APP_ID }}
          NEXT_PUBLIC_FRONTEND_FORGE_API_KEY: ${{ secrets.NEXT_PUBLIC_FRONTEND_FORGE_API_KEY }}
          NEXT_PUBLIC_FRONTEND_FORGE_API_URL: ${{ secrets.NEXT_PUBLIC_FRONTEND_FORGE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Remove dev dependencies
        run: npm prune --production

      - name: Zip deployment package
        run: |
          zip -r app.zip \
            .next \
            node_modules \
            public \
            server.js \
            web.config \
            package.json \
            next.config.ts \
            -x ".next/cache/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          include-hidden-files: true
          path: app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'euroland-nextjs'
          slot-name: 'Production'
          package: app.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8A16392277504298A57BBEE8F704A1B1 }}
